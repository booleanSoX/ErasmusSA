<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Utente | ErasmusSA</title>
    <link rel="stylesheet" href="css/foundation.css">
    <script src="js/script.js" defer></script></head>
<body>

    <div class="banner-wrapper">
        <img class="top-banner" src="https://www.softwarengineering.it/assets/img/logo_softwarengineering_blubordobianco.png" alt="Logo">
    </div>

    <div class="dashboard-content">
        <div class="grid-container">
            <div class="grid-x grid-padding-x align-center">
                <div class="cell small-12 medium-8 large-6">
                    
                    <div class="card-box">
                        <h2 class="text-center">Crea un Account</h2>
                        <hr>
                        
                        <form id="registerForm" action="register.php" method="POST">
                            
                            <div id="error-message" ></div>

                            <div class="grid-x grid-padding-x">
                                <div class="cell medium-12">
                                    <label>Nome
                                        <input type="text" name="name" placeholder="Il tuo nome" required>
                                    </label>
                                </div>
                                
                                <div class="cell medium-6">
                                    <label>Primo Cognome
                                        <input type="text" name="last_name" placeholder="Cognome 1" required>
                                    </label>
                                </div>
                                <div class="cell medium-6">
                                    <label>Secondo Cognome (Opzionale)
                                        <input type="text" name="second_last_name" placeholder="Cognome 2">
                                    </label>
                                </div>

                                <div class="cell medium-6">
                                    <label>Nome Utente
                                        <input type="text" name="username" placeholder="es. sebas_perugia" required>
                                    </label>
                                </div>
                                <div class="cell medium-6">
                                    <label>Indirizzo Email
                                        <input type="email" name="email" placeholder="email@esempio.com" required>
                                    </label>
                                </div>

                                <div class="cell medium-6">
                                    <label>Password
                                        <input type="password" id="password" name="password" placeholder="Almeno 8 caratteri" required>
                                    </label>
                                </div>
                                <div class="cell medium-6">
                                    <label>Conferma Password
                                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Ripeti la password" required>
                                    </label>
                                </div>

                                <div class="cell medium-12">
                                    <button type="submit" class="button expanded">Completa la Registrazione</button>
                                </div>
                            </div>
                        </form>
                        
                        <div class="text-center">
                            <p class="help-text">Hai già un account? <a href="index.html">Accedi qui</a></p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
