<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambia Password</title>
    <link rel="stylesheet" href="css/foundation.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; background: #252525; margin: 0;">

<nav class="banner-wrapper">
    <img class="top-banner" src="https://www.softwarengineering.it/assets/img/logo_softwarengineering_blubordobianco.png" alt="Logo">
    <a href="profile.html" class="button alert" style="float: right; margin-top: 1rem;">Indietro</a>
</nav>

<div class="main-content">
    <div class="grid-container" style="width: 100%;">
        <div class="grid-x grid-padding-x align-center">
            <div class="cell small-11 medium-8 large-5" style="background: white; color: black; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

                <form action="change_password.php" method="POST">
                    <h2 class="text-center">Cambia Password</h2>

                    <label for="current_password">Password Attuale
                        <input type="password" id="current_password" name="current_password" required>
                    </label>

                    <label for="new_password">Nuova Password
                        <input type="password" id="new_password" name="new_password" placeholder="Almeno 8 caratteri" required>
                    </label>

                    <label for="confirm_password">Conferma Nuova Password
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </label>

                    <button type="submit" class="button expanded success" style="margin-top: 1rem;">Aggiorna Password</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
