<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/foundation.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; background: #252525; margin: 0;">

<nav class="banner-wrapper">
    <img class="top-banner" src="https://www.softwarengineering.it/assets/img/logo_softwarengineering_blubordobianco.png" alt="Logo">
</nav>

<div class="main-content">
    <div class="grid-container" style="width: 100%;">
        <div class="grid-x grid-padding-x align-center">
            <div class="cell small-11 medium-8 large-5" style="background: white; color: black; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

                <form id="loginForm">
                    <h2 class="text-center">Benvenuto</h2>

                    <div id="error-message" style="display: none; background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; border: 1px solid #f5c6cb;"></div>

                    <label for="username">Utente
                        <input type="text" id="username" name="username" required>
                    </label>

                    <label for="password">Password
                        <input type="password" id="password" name="password" required>
                    </label>

                    <button type="submit" class="button expanded" style="margin-top: 1rem;">Entrare</button>

                    <p class="text-center-bottom" style="margin-top: 1rem;">
                        <a href="recover_password.html">¿Hai dimenticato la password?</a>
                    </p>
                    <p class="text-center-bottom" style="margin-top: 1rem;">
                        <a href="register.html">Crea un account</a>
                    </p>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
// --- MAGIA DE LA NOTIFICACIÓN EMERGENTE ---
document.addEventListener('DOMContentLoaded', () => {
    // Busca mensajes en la URL
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');

    if (msg) {
        let textoAlerta = '';
        
        if (msg === 'account_created') {
            textoAlerta = 'Account creato con successo!';
        } else if (msg === 'password_changed') {
            textoAlerta = 'Password cambiata con successo!';
        }

        if (textoAlerta) {
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                showCloseButton: true,
                timer: 6000,
                timerProgressBar: true,
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            Toast.fire({
                icon: 'success',
                title: textoAlerta
            });

            // Borra la señal de la URL para que no salga al recargar la página
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
});

// --- TU LÓGICA DE LOGIN ORIGINAL INTACTA ---
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); 
    
    const formData = new FormData(this);
    const errorDiv = document.getElementById('error-message');

    errorDiv.style.display = 'none'; 

    fetch('index.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json()) 
    .then(data => {
        if (data.status === 'success') {
            window.location.href = 'main.php';
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = data.message;
        }
    })
    .catch(error => {
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = 'Error de conexión con el servidor.';
    });
});
</script>

</body>
</html>
